<div style="display: flex;">
    <div class="info">
        @if(show) {
            <div style="width: 100%; display: flex;justify-content: center;">
                <div [ngClass]="getLogoBig(data?.properties?.name)"></div>
            </div>
            <dl>
                <dt>Name:</dt>
                <dd>{{ current?.properties?.EER13NM}}</dd>
            </dl>
        }
        @else {
            <div style="width: 100%; display: flex;justify-content: center;">
                <div class="logo-big logo-deutschland"></div>
            </div>
            <dl>
                <dt>Country:</dt>
                <dd>England</dd>
                <dt></dt>
            </dl>
        }
    </div>
  <app-chart>
    <app-chart-series
      type="map"
      [data]="data"
      [style]="style"
      (onHover)="showData($event)"
      (onLeave)="show=false"></app-chart-series>
